services:
  qwen2api:
    container_name: qwen2api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: qwen2api-structured:latest
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # 如果需要修改Docker暴露端口，请修改ports中的参数
      # 示例(8080:3000) 则访问 http://localhost:8080
      # To change the exposed port, modify the ports mapping above
      # Example: (8080:3000) → http://localhost:8080
      - SERVICE_PORT=3000
      # API 密钥 (非必填)
      # 如果需要使用多账户或使用内置账户，请填写
      # API key (optional). Required for multi-account or built-in account usage
      - API_KEY=qwen2api
      # 监听地址(非必填)
      # Listen address (optional)
      - LISTEN_ADDRESS=
      # PM2 多进程配置
      # PM2进程数量: max(使用所有CPU核心), 数字(指定进程数量), 1(单进程)
      # 注意: PM2集群模式下所有进程共用同一个端口
      # PM2 multi-process: max (all cores), number, or 1 (single)
      # Note: in cluster mode all processes share the same port
      - PM2_INSTANCES=1
      # PM2内存限制，超过此限制将自动重启进程
      # PM2 memory limit — process restarts when exceeded
      - PM2_MAX_MEMORY=1G
      # 搜索信息展示模式
      # table: 使用折叠块和表格展示
      # text: 使用纯文本
      # Search info display mode (table: collapsible tables / text: plain text)
      - SEARCH_INFO_MODE=table
      # 是否输出思考过程
      # Whether to output the thinking process
      - OUTPUT_THINK=false
      # 简化模型映射 (true: 只返回基础模型, false: 返回完整模型列表)
      # Simplified model mapping (true: base models only, false: full list)
      - SIMPLE_MODEL_MAP=false
      # redis 连接地址(如果使用redis模式，则必填，当redis使用tls时将redis://替换为rediss://)
      # Redis URL (required for redis mode; use rediss:// for TLS)
      - REDIS_URL=
      # 数据保存模式
      # Data save mode (none / file / redis)
      - DATA_SAVE_MODE=none
      # 账号(如果使用redis和file模式，则不需要填写)
      # Accounts (not needed for redis/file mode)
      - ACCOUNTS=
      # 图片缓存
      # Image cache mode (default: memory / file: disk)
      - CACHE_MODE=default
